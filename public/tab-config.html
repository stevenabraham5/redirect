<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Retro - Tab Setup</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Segoe UI, Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
        color: #0f172a;
      }
      .card {
        width: min(560px, calc(100% - 2rem));
        border: 1px solid #dbeafe;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.1);
        padding: 1.25rem;
        text-align: center;
      }
      .eyebrow {
        margin: 0;
        font-size: 0.75rem;
        letter-spacing: 0.08em;
        font-weight: 700;
        color: #1d4ed8;
      }
      h1 {
        margin: 0.4rem 0 0.5rem;
        font-size: 1.7rem;
      }
      p {
        margin: 0;
        color: #334155;
      }
      .status {
        margin-top: 0.8rem;
        font-weight: 600;
      }
      .actions {
        margin-top: 1rem;
        display: flex;
        justify-content: center;
      }
      .btn {
        border: 1px solid #93c5fd;
        background: #eff6ff;
        color: #1e3a8a;
        border-radius: 999px;
        font-size: 0.95rem;
        font-weight: 600;
        padding: 0.55rem 0.9rem;
        cursor: pointer;
      }
      .ready {
        color: #047857;
      }
      .error {
        color: #b91c1c;
      }
    </style>
    <script src="https://res.cdn.office.net/teams-js/2.0.0/js/MicrosoftTeams.min.js"></script>
  </head>
  <body>
    <main class="card" role="main">
      <p class="eyebrow">MICROSOFT TEAMS TAB SETUP</p>
      <h1>Team Retro</h1>
      <p>If sign-in is needed, open it in a separate browser window.</p>
      <p id="status" class="status">Initializing Teams SDK...</p>
      <div class="actions">
        <button id="openAuth" class="btn" type="button">Open Sign-In Window</button>
      </div>
    </main>

    <script>
      (function () {
        const statusEl = document.getElementById('status');
        const openAuthBtn = document.getElementById('openAuth');
        const appRoot = window.location.origin + '/';

        openAuthBtn.addEventListener('click', function () {
          window.open(appRoot, '_blank', 'noopener,noreferrer');
        });

        function setStatus(message, stateClass) {
          statusEl.textContent = message;
          statusEl.className = 'status ' + (stateClass || '');
        }

        async function init() {
          try {
            await microsoftTeams.app.initialize();

            if (!microsoftTeams.pages.config.isSupported()) {
              setStatus('Tab configuration is not supported in this context.', 'error');
              return;
            }

            microsoftTeams.pages.config.registerOnSaveHandler(function (saveEvent) {
              microsoftTeams.pages.config
                .setConfig({
                  entityId: 'retro-board-tab',
                  suggestedDisplayName: 'Retrospective',
                  contentUrl: appRoot,
                  websiteUrl: appRoot
                })
                .then(function () {
                  saveEvent.notifySuccess();
                })
                .catch(function () {
                  saveEvent.notifyFailure('Unable to save tab configuration.');
                });
            });

            microsoftTeams.pages.config.setValidityState(true);
            setStatus('Ready. Sign in via the button (if needed), then click Save in Teams.', 'ready');
          } catch (_err) {
            setStatus('Failed to initialize Teams SDK in this window.', 'error');
          }
        }

        init();
      })();
    </script>
  </body>
</html>
